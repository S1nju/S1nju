
<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Consolas, Monaco, monospace; }
      @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
      .cursor { animation: blink 1s step-end infinite; }
    </style>
    <linearGradient id="topbar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2b2b2b"/>
    </linearGradient>
  </defs>

  <!-- window shadow -->
  <rect x="6" y="10" width="748" height="454" rx="12" fill="#000000" opacity="0.5"/>

  <!-- window body -->
  <rect x="0" y="0" width="748" height="454" rx="12" fill="#0b0f0c" stroke="#2ee66b" stroke-opacity="0.25"/>

  <!-- title bar -->
  <path d="M0,12 C0,5.4 5.4,0 12,0 L736,0 C742.6,0 748,5.4 748,12 L748,36 L0,36 Z" fill="url(#topbar)"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="374" y="23" class="mono" font-size="13" fill="#9aa39a" text-anchor="middle">amine@github: ~</text>

  <!-- scanline overlay for CRT feel -->
  <g opacity="0.04">
    <rect x="0" y="36" width="748" height="418" fill="url(#scan)"/>
  </g>

  <!-- terminal content -->
  <g class="mono" font-size="15">
    <text x="24" y="66" fill="#4ade80">amine@github</text>
    <tspan></tspan>
    <text x="150" y="66" fill="#e5e5e5">:</text>
    <text x="158" y="66" fill="#61a0ff">~</text>
    <text x="178" y="66" fill="#e5e5e5">$ whoami</text>
    <text x="24" y="90" fill="#f5f5f5">amine — full-stack developer / ai enthusiast 🇩🇿</text>

    <text x="24" y="126" fill="#4ade80">amine@github</text>
    <text x="150" y="126" fill="#e5e5e5">:</text>
    <text x="158" y="126" fill="#61a0ff">~</text>
    <text x="178" y="126" fill="#e5e5e5">$ neofetch</text>

    <!-- ascii art (left) -->
    <g fill="#2ee66b" font-size="14">
      <text x="40" y="158">      .---------------.</text>
      <text x="40" y="176">     /   > _          /|</text>
      <text x="40" y="194">    /-----------------/ |</text>
      <text x="40" y="212">   |                  |  |</text>
      <text x="40" y="230">   |    &lt;/&gt;  DZ       |  |</text>
      <text x="40" y="248">   |                  | /</text>
      <text x="40" y="266">    '----------------'/</text>
      <text x="40" y="284">        [_______]</text>
      <text x="40" y="302">      _/         \_</text>
      <text x="40" y="320">     '-------------'</text>
    </g>

    <!-- neofetch info (right) -->
    <g font-size="14.5">
      <text x="330" y="158" fill="#4ade80" font-weight="bold">amine</text><text x="374" y="158" fill="#e5e5e5">@github.dev</text>
      <line x1="330" y1="166" x2="560" y2="166" stroke="#3a3a3a" stroke-width="1"/>

      <text x="330" y="186" fill="#61a0ff" font-weight="bold">OS</text><text x="380" y="186" fill="#f5f5f5">Algeria Linux 🇩🇿</text>
      <text x="330" y="206" fill="#61a0ff" font-weight="bold">Role</text><text x="380" y="206" fill="#f5f5f5">Full-Stack Developer</text>
      <text x="330" y="226" fill="#61a0ff" font-weight="bold">Focus</text><text x="380" y="226" fill="#f5f5f5">System Design · Distributed Systems</text>
      <text x="330" y="246" fill="#61a0ff" font-weight="bold">Interest</text><text x="390" y="246" fill="#f5f5f5">AI / ML, Agentic Systems</text>
      <text x="330" y="266" fill="#61a0ff" font-weight="bold">Shell</text><text x="380" y="266" fill="#f5f5f5">bash + curiosity</text>
      <text x="330" y="286" fill="#61a0ff" font-weight="bold">Uptime</text><text x="390" y="286" fill="#f5f5f5">always building, always learning</text>
      <text x="330" y="306" fill="#61a0ff" font-weight="bold">Frameworks</text><text x="420" y="306" fill="#f5f5f5">react, laravel, fastapi, spring, tensorflow</text>

      <!-- color swatches -->
      <g>
        <rect x="330" y="322" width="16" height="16" fill="#ff5f56"/>
        <rect x="350" y="322" width="16" height="16" fill="#ffbd2e"/>
        <rect x="370" y="322" width="16" height="16" fill="#27c93f"/>
        <rect x="390" y="322" width="16" height="16" fill="#61a0ff"/>
        <rect x="410" y="322" width="16" height="16" fill="#a855f7"/>
        <rect x="430" y="322" width="16" height="16" fill="#4ade80"/>
        <rect x="450" y="322" width="16" height="16" fill="#e5e5e5"/>
        <rect x="470" y="322" width="16" height="16" fill="#9aa39a"/>
      </g>
    </g>

    <!-- closing prompt -->
    <text x="24" y="376" fill="#4ade80">amine@github</text>
    <text x="150" y="376" fill="#e5e5e5">:</text>
    <text x="158" y="376" fill="#61a0ff">~</text>
    <text x="178" y="376" fill="#e5e5e5">$ echo "thanks for stopping by"</text>
    <text x="24" y="400" fill="#f5f5f5">thanks for stopping by</text>

    <text x="24" y="432" fill="#4ade80">amine@github</text>
    <text x="150" y="432" fill="#e5e5e5">:</text>
    <text x="158" y="432" fill="#61a0ff">~</text>
    <text x="178" y="432" fill="#e5e5e5">$</text>
    <rect x="196" y="419" width="10" height="16" fill="#4ade80" class="cursor"/>
  </g>
</svg>
